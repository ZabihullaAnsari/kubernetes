apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app

spec: 
  replicas: 3
  selector:
   matchLabels: 
    app: app-1
  
  template:
    metadata:
      labels:
        app: app-1
  
    spec:
      containers:
        - name: web-1
          image: zabihulla01/app1
          ports:
           -  containerPort: 80

---
apiVersion: v1 
kind: Service
metadata: 
 name: myweb
spec:
  type: NodePort
  selector:
    app: app-1
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007 
